server {
    listen 80;

    # Serve the React SPA — static files with client-side routing fallback.
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Only expose the chat API and health check — nothing else is proxied.
    location /api/conversations {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Agent runs (LLM + tools) routinely take 10–60s. Defaults would 504.
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /api/health {
        proxy_pass http://backend:8000;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
}
