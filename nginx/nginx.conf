server {
    listen 80;

    # Serve the React SPA — static files with client-side routing fallback.
    root /usr/share/nginx/html;

    # Vite emits hashed bundles into /assets/ (e.g. /assets/index-abc123.js).
    # Filenames change per build, so cache them aggressively and immutably.
    # Must come BEFORE the catch-all `location /` so the SPA fallback doesn't
    # serve index.html for missing asset paths.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the HTML entry point so a fresh build is picked
    # up on plain refresh — without this, browsers hold onto the old
    # index.html which references the previous hashed JS/CSS bundle, and
    # rebuilds appear to do nothing until Cmd+Shift+R. The hashed assets
    # themselves can stay cacheable (their filename changes per build).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Only expose the agent stream, conversation metadata, and health
    # check — nothing else is proxied.
    # fastapi-users auth routes: register / login / logout / me. Login sets the
    # httpOnly session cookie the browser then sends with every same-origin call.
    location /api/auth {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/conversations {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Conversation metadata is fast; modest timeouts are fine.
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # AG-UI streaming endpoint: SSE that emits text/tool/state events as the
    # agent runs. Default proxy_buffering would batch the whole response, so
    # the frontend would see nothing until the run completes. Disable it.
    location /api/agent {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip Accept-Encoding so a buggy intermediate can't gzip the SSE
        # stream — buffered compression would defeat proxy_buffering off.
        proxy_set_header Accept-Encoding "";

        # SSE essentials — let chunks through immediately, persistent
        # HTTP/1.1 keep-alive, long read while the agent thinks.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /api/health {
        proxy_pass http://backend:8000;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Direct listing reads — agent-bypass path used by the frontend's
    # detail panel and future bookmarks / shareable URLs. Backend sets
    # `Cache-Control: public, max-age=300` so the browser handles repeat
    # clicks without round-tripping.
    location /api/listings {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # MapLibre / Protomaps tile hosting. The pmtiles client uses HTTP Range
    # requests; nginx supports those by default. CORS is permissive because
    # the same-origin nginx already fronts the SPA — leave open for now.
    location /tiles/ {
        alias /usr/share/nginx/tiles/;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Headers "Range";
        add_header Cache-Control "public, max-age=86400";
        types {
            application/octet-stream pmtiles;
        }
    }
}
