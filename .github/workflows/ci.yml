name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend (lint, type, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Root workspace lock is the single source of truth — `uv sync` from
          # services/backend resolves against it (this is a uv workspace). The
          # old per-service locks were deleted in the v2 migration.
          cache-dependency-glob: uv.lock

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # Build the project's own Postgres image (PostGIS + pgvector) rather than
      # a stock `postgres:16` service container — the integration tests' schema
      # bootstrap does `CREATE EXTENSION postgis/vector`, which a bare image
      # can't satisfy. Building from services/postgres/ keeps CI in parity with
      # dev/prod. (GitHub Actions `services:` can't build an image, so we run it
      # by hand.) `flat_chat_test` is a throwaway DB the entrypoint creates on
      # first init; conftest builds the world/app schema into it idempotently.
      - name: Start Postgres (PostGIS + pgvector)
        working-directory: ${{ github.workspace }}
        run: |
          docker build -t flat-chat-postgres-ci services/postgres
          docker run -d --name postgres-ci \
            -e POSTGRES_USER=flat_chat \
            -e POSTGRES_PASSWORD=flat_chat \
            -e POSTGRES_DB=flat_chat_test \
            -p 5432:5432 \
            flat-chat-postgres-ci
          echo "Waiting for Postgres to accept connections…"
          for i in $(seq 1 30); do
            if docker exec postgres-ci pg_isready -U flat_chat -d flat_chat_test; then
              echo "Postgres ready."
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time:" >&2
          docker logs postgres-ci >&2
          exit 1

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format
        run: uv run ruff format --check src tests

      - name: ty check
        run: uv run ty check src

      # TEST_DATABASE_URL flips the integration tier on (skipped silently when
      # unset — see services/backend/tests/conftest.py). The unit tier needs no
      # DB and runs regardless.
      - name: pytest
        run: uv run pytest
        env:
          TEST_DATABASE_URL: postgresql://flat_chat:flat_chat@localhost:5432/flat_chat_test

  frontend:
    name: Frontend (typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: typecheck (tsc -b)
        run: npm run typecheck

      - name: vitest
        run: npm run test:run
