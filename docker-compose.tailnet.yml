# Overlay that puts Postgres behind a Tailscale sidecar so teammates can query
# the host's DB over the tailnet. Only the *host* machine should load this file —
# teammates running the stack locally use the base docker-compose.yml only.
#
# Host usage:
#   docker compose -f docker-compose.yml -f docker-compose.tailnet.yml up
#   (or set COMPOSE_FILE=docker-compose.yml:docker-compose.tailnet.yml in .env)
#
# See agent-compound-docs/decisions/shared-dev-database.md.

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: flat-chat-db
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY must be set — generate at https://login.tailscale.com/admin/settings/keys (tag:flat-chat-db)}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_EXTRA_ARGS=--advertise-tags=tag:flat-chat-db
    volumes:
      - tailscale_state:/var/lib/tailscale
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      default:
        aliases:
          - postgres
    restart: unless-stopped

  postgres:
    # Postgres joins the tailscale container's network namespace, so it listens
    # on the tailnet interface instead of the docker bridge. The tailscale
    # service is aliased as "postgres" above, so backend/ingestion don't change.
    network_mode: "service:tailscale"
    ports: !reset []
    depends_on:
      tailscale:
        condition: service_started

volumes:
  tailscale_state:
