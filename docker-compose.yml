services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      # Map tiles for MapLibre. The .pmtiles file is downloaded out-of-band —
      # see services/backend/README.md for the one-time setup. Volume is
      # bind-mounted so swapping the file doesn't require a container rebuild.
      - ./data/tiles:/usr/share/nginx/tiles:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build: services/frontend/
    volumes:
      - frontend_dist:/app/dist
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist/index.html"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  backend:
    # Root context so the build sees the workspace `uv.lock` (frozen install).
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_BASE_URL=${JINA_BASE_URL:-https://api.jina.ai/v1}
      - PHOENIX_ENABLED=${PHOENIX_ENABLED:-true}
      - PHOENIX_ENDPOINT=${PHOENIX_ENDPOINT:-http://phoenix:6006/v1/traces}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Travel-time engines (the `routing` profile). Default to the service
      # hostnames; when that profile isn't up, apply_travel_time degrades
      # gracefully (the agent offers to proceed without commute times).
      - OSRM_URL=${OSRM_URL:-http://osrm:5000}
      - MOTIS_URL=${MOTIS_URL:-http://motis:8080}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_LIFETIME_SECONDS=${JWT_LIFETIME_SECONDS:-604800}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DEV_USER_EMAIL=${DEV_USER_EMAIL:-dev@flatchat.dev}
      - DEV_USER_PASSWORD=${DEV_USER_PASSWORD:-dev}
      - PROF_USER_EMAIL=${PROF_USER_EMAIL:-}
      - PROF_USER_PASSWORD=${PROF_USER_PASSWORD:-}
    command: uv run --no-dev uvicorn flat_chat.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      # Loopback-only — Phoenix traces contain LLM prompts / tool calls.
      # Reachable at http://localhost:6006 from the dev's own machine; not
      # exposed on LAN / tailnet. Same principle as Postgres below.
      - "127.0.0.1:6006:6006"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data

  postgres:
    build: services/postgres/
    # Bump track_activity_query_size from the 1024-byte default so
    # pg_stat_activity.query shows our full SELECTs (used by
    # `just psql-active` / `just psql-session` for debugging stuck queries).
    command:
      - "postgres"
      - "-c"
      - "track_activity_query_size=16384"
    ports:
      # Loopback-only so psql / dump tools work from the dev's host without
      # exposing the DB on LAN / tailnet. The Tailscale sidecar in
      # docker-compose.host.yml is the only way teammates reach this DB.
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    profiles:
      - ingestion
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Forwarded for `silver.embed`, the Jina v3 backfill CLI.
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_BASE_URL=${JINA_BASE_URL:-https://api.jina.ai/v1}
      # Forwarded for the geocoding pass inside `silver.transform` (backfills
      # coordinates for listings that arrived without a scraped point).
      - NOMINATIM_BASE_URL=${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      - GEOCODER_USER_AGENT=${GEOCODER_USER_AGENT:-flat-chat-geocoder/1.0 (+https://github.com/nake-b/flat-chat)}
      - GEOCODER_RATE_LIMIT_S=${GEOCODER_RATE_LIMIT_S:-1.0}

  # Geo-context ETL (Berlin GDI WFS + VBB GTFS).
  # Opt-in via `--profile geo-context`; does not run on `docker compose up`.
  # Chains gold re-enrichment at the end (if any WFS/GTFS family succeeded)
  # so the agent's search results reflect the refreshed truth without a
  # manual `gold.run`. See services/ingestion/src/geo_context/README.md.
  geo-context:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    profiles:
      - geo-context
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["uv", "run", "--no-dev", "python", "-m", "geo_context.run"]

  # Gold layer enrichment — populates listings_geo_context from existing
  # silver listings + silver geo-context. Standalone-runnable when you
  # need to re-enrich without scraping or refreshing geo-context.
  # Auto-chained at the end of `silver.run` and `geo_context.run`.
  gold:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    profiles:
      - gold
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["uv", "run", "--no-dev", "python", "-m", "gold.run"]

  # Platinum layer — embedding backfill for listings_embeddings. Requires
  # JINA_API_KEY to call Jina v3. Auto-chained at the end of `silver.run`
  # (best-effort; skipped silently if no key).
  platinum:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    profiles:
      - platinum
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - JINA_API_KEY=${JINA_API_KEY:-}
    command: ["uv", "run", "--no-dev", "python", "-m", "platinum.run"]

  # Travel-time routing engines. Internal-only (no published port); the backend
  # reaches them by hostname. Opt-in via `--profile routing` because they need a
  # one-time data prep (`scripts/prep-routing.sh`, which builds the graphs into
  # the bind-mounted dirs below) — like the out-of-band tiles file. Without the
  # profile the backend still runs; apply_travel_time just degrades gracefully.
  # See agent-compound-docs/decisions/travel-time-routing.md.
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    profiles:
      - routing
    volumes:
      - ./data/routing/osrm:/data:ro
    # MLD pipeline (prep-routing.sh ran extract/partition/customize). The raised
    # --max-table-size covers a full result set (MARKER_CAP=5000) in one /table.
    command:
      ["osrm-routed", "--algorithm", "mld", "--max-table-size", "5500",
       "/data/berlin-latest.osrm"]

  motis:
    image: ghcr.io/motis-project/motis:latest
    profiles:
      - routing
    working_dir: /work
    volumes:
      - ./data/routing/motis:/work
    # Serves the import output in /work/data (prep-routing.sh ran `motis import`).
    command: ["/motis", "server"]

volumes:
  postgres_data:
  frontend_dist:
  phoenix_data:
