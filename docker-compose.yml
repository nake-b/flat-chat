services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      # Map tiles for MapLibre. The .pmtiles file is downloaded out-of-band —
      # see services/backend/README.md for the one-time setup. Volume is
      # bind-mounted so swapping the file doesn't require a container rebuild.
      - ./data/tiles:/usr/share/nginx/tiles:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build: services/frontend/
    volumes:
      - frontend_dist:/app/dist
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist/index.html"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  backend:
    build: services/backend/
    depends_on:
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_BASE_URL=${JINA_BASE_URL:-https://api.jina.ai/v1}
      - PHOENIX_ENABLED=${PHOENIX_ENABLED:-true}
      - PHOENIX_ENDPOINT=${PHOENIX_ENDPOINT:-http://phoenix:6006/v1/traces}
    command: uv run --no-dev uvicorn flat_chat.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      # Loopback-only — Phoenix traces contain LLM prompts / tool calls.
      # Reachable at http://localhost:6006 from the dev's own machine; not
      # exposed on LAN / tailnet. Same principle as Postgres below.
      - "127.0.0.1:6006:6006"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data

  postgres:
    build: services/postgres/
    ports:
      # Loopback-only so psql / dump tools work from the dev's host without
      # exposing the DB on LAN / tailnet. The Tailscale sidecar in
      # docker-compose.host.yml is the only way teammates reach this DB.
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build: services/ingestion/
    profiles:
      - ingestion
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Forwarded for `silver.embed`, the Jina v3 backfill CLI.
      - JINA_API_KEY=${JINA_API_KEY:-}
      - JINA_BASE_URL=${JINA_BASE_URL:-https://api.jina.ai/v1}

  # Geo-context ETL (Berlin GDI WFS + VBB GTFS).
  # Opt-in via `--profile geo-context`; does not run on `docker compose up`.
  # See services/ingestion/src/geo_context/README.md for the runbook.
  geo-context:
    build: services/ingestion/
    profiles:
      - geo-context
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["uv", "run", "--no-dev", "python", "-m", "geo_context.run"]

volumes:
  postgres_data:
  frontend_dist:
  phoenix_data:
